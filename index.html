<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Finance EMI App</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,sans-serif;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b
);

padding:20px;

min-height:100vh;
}

.container{

max-width:1200px;
margin:auto;
}

.card{

background:white;

padding:35px;

border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.3);

margin-bottom:30px;
}

h1{

text-align:center;

margin-bottom:10px;

color:#0f172a;
}

.subtitle{

text-align:center;

color:gray;

margin-bottom:30px;
}

.form-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;
}

input{

padding:15px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:15px;
}

input:focus{

outline:none;

border-color:#2563eb;

box-shadow:
0 0 10px rgba(37,99,235,0.3);
}

button{

padding:15px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:16px;

cursor:pointer;

margin-top:20px;

width:100%;
}

button:hover{
background:#1d4ed8;
}

#result{

margin-top:30px;

padding:25px;

border-radius:15px;

background:#eff6ff;

line-height:2;

font-size:18px;

font-weight:bold;

color:#1e3a8a;
}

.customer-card{

background:white;

padding:25px;

border-radius:18px;

margin-bottom:20px;

box-shadow:
0 5px 15px rgba(0,0,0,0.1);
}

.customer-card h3{

margin-bottom:15px;

color:#0f172a;
}

.delete-btn{

background:#dc2626;

margin-top:15px;
}

.delete-btn:hover{
background:#b91c1c;
}

@media(max-width:600px){

.card{
padding:20px;
}

.customer-card{
padding:20px;
}
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>
Finance EMI App
</h1>

<p class="subtitle">
Customer Loan & EMI Management
</p>

<div class="form-grid">

<input type="text"
id="name"
placeholder="Customer Name">

<input type="text"
id="phone"
placeholder="WhatsApp Number">

<input type="text"
id="product"
placeholder="Product Name">

<input type="number"
id="productPrice"
placeholder="Product Price">

<input type="number"
id="downPayment"
placeholder="Down Payment">

<input type="number"
id="rate"
placeholder="Interest Rate %">

<input type="number"
id="months"
placeholder="Loan Duration">

<input type="date"
id="nextDate">

</div>

<button onclick="saveCustomer()">
Save Customer
</button>

<div id="result"></div>

</div>

<h2 style="color:white;margin-bottom:20px;">
Saved Customers
</h2>

<div id="customerList"></div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQoK09Z2OXJzhOvFR361_WNTuiz1Ry3Nw",
  authDomain: "finance-reminder-893f6.firebaseapp.com",
  databaseURL: "https://finance-reminder-893f6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "finance-reminder-893f6",
  storageBucket: "finance-reminder-893f6.firebasestorage.app",
  messagingSenderId: "902285544691",
  appId: "1:902285544691:web:49e85893272d346db77b86"
};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

window.saveCustomer =
async function(){

let name =
document.getElementById("name").value;

let phone =
document.getElementById("phone").value;

let product =
document.getElementById("product").value;

let productPrice =
parseFloat(
document.getElementById("productPrice").value
);

let downPayment =
parseFloat(
document.getElementById("downPayment").value
);

let rate =
parseFloat(
document.getElementById("rate").value
);

let months =
parseInt(
document.getElementById("months").value
);

let nextDate =
document.getElementById("nextDate").value;

let loanAmount =
productPrice - downPayment;

let monthlyRate =
rate / 12 / 100;

let emi =

(
loanAmount *
monthlyRate *
Math.pow(
1 + monthlyRate,
months
)
)

/

(
Math.pow(
1 + monthlyRate,
months
) - 1
);

emi =
emi.toFixed(2);

let totalPayment =
(emi * months).toFixed(2);

let totalInterest =
(totalPayment - loanAmount).toFixed(2);

document.getElementById("result")
.innerHTML = `

Loan Amount:
₹${loanAmount}

<br><br>

Monthly EMI:
₹${emi}

<br><br>

Total Interest:
₹${totalInterest}

`;

await addDoc(
collection(db,"customers"),
{

name,
phone,
product,
productPrice,
downPayment,
loanAmount,
rate,
months,
emi,
nextDate

}
);

alert("Customer Saved!");

loadCustomers();
}

async function loadCustomers(){

const querySnapshot =
await getDocs(
collection(db,"customers")
);

let html = "";

querySnapshot.forEach((docSnap)=>{

const data =
docSnap.data();

html += `

<div class="customer-card">

<h3>
${data.name}
</h3>

<p>
<b>Product:</b>
${data.product}
</p>

<p>
<b>Loan Amount:</b>
₹${data.loanAmount}
</p>

<p>
<b>Monthly EMI:</b>
₹${data.emi}
</p>

<p>
<b>Next EMI Date:</b>
${data.nextDate}
</p>

<button
class="delete-btn"
onclick="deleteCustomer('${docSnap.id}')">

Delete

</button>

</div>
`;
});

document.getElementById("customerList")
.innerHTML = html;
}

window.deleteCustomer =
async function(id){

await deleteDoc(
doc(db,"customers",id)
);

loadCustomers();
}

loadCustomers();

</script>

</body>
</html>
