<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Finance EMI App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:Arial,sans-serif;

      background:
      linear-gradient(
        135deg,
        #0f172a,
        #1e293b
      );

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      padding:20px;
    }

    .container{

      width:100%;
      max-width:900px;
    }

    .card{

      background:white;

      border-radius:20px;

      padding:40px;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.3);
    }

    h1{

      text-align:center;

      color:#0f172a;

      margin-bottom:10px;

      font-size:38px;
    }

    .subtitle{

      text-align:center;

      color:gray;

      margin-bottom:35px;

      font-size:16px;
    }

    .form-grid{

      display:grid;

      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));

      gap:20px;
    }

    input{

      padding:15px;

      border-radius:12px;

      border:1px solid #cbd5e1;

      font-size:15px;

      transition:0.3s;
    }

    input:focus{

      outline:none;

      border-color:#2563eb;

      box-shadow:
      0 0 10px rgba(37,99,235,0.3);
    }

    button{

      width:100%;

      margin-top:30px;

      padding:16px;

      border:none;

      border-radius:14px;

      background:#2563eb;

      color:white;

      font-size:18px;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{

      background:#1d4ed8;

      transform:translateY(-2px);
    }

    #result{

      margin-top:30px;

      background:#eff6ff;

      padding:30px;

      border-radius:18px;

      line-height:2;

      color:#1e3a8a;

      font-size:20px;

      font-weight:bold;
    }

    .label{

      color:#334155;
    }

    @media(max-width:600px){

      .card{
        padding:25px;
      }

      h1{
        font-size:28px;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="card">

      <h1>
        Finance EMI App
      </h1>

      <p class="subtitle">
        Customer Loan & EMI Calculator
      </p>

      <div class="form-grid">

        <input
          type="text"
          id="name"
          placeholder="Customer Name">

        <input
          type="text"
          id="phone"
          placeholder="WhatsApp Number">

        <input
          type="text"
          id="product"
          placeholder="Product Name">

        <input
          type="number"
          id="productPrice"
          placeholder="Product Price">

        <input
          type="number"
          id="downPayment"
          placeholder="Down Payment">

        <input
          type="number"
          id="rate"
          placeholder="Interest Rate %">

        <input
          type="number"
          id="months"
          placeholder="Loan Duration (Months)">

        <input
          type="date"
          id="nextDate">

      </div>

      <button onclick="calculateEMI()">
        Calculate EMI
      </button>

      <div id="result"></div>

    </div>

  </div>

  <script>

    function calculateEMI(){

      let name =
      document.getElementById("name").value;

      let phone =
      document.getElementById("phone").value;

      let product =
      document.getElementById("product").value;

      let productPrice =
      parseFloat(
      document.getElementById("productPrice").value
      );

      let downPayment =
      parseFloat(
      document.getElementById("downPayment").value
      );

      let rate =
      parseFloat(
      document.getElementById("rate").value
      );

      let months =
      parseInt(
      document.getElementById("months").value
      );

      let nextDate =
      document.getElementById("nextDate").value;

      let loanAmount =
      productPrice - downPayment;

      let monthlyRate =
      rate / 12 / 100;

      let emi =

      (
        loanAmount *
        monthlyRate *
        Math.pow(
          1 + monthlyRate,
          months
        )
      )

      /

      (
        Math.pow(
          1 + monthlyRate,
          months
        ) - 1
      );

      emi = emi.toFixed(2);

      let totalPayment =
      (emi * months).toFixed(2);

      let totalInterest =
      (totalPayment - loanAmount).toFixed(2);

      document.getElementById("result")
      .innerHTML = `

      <div>

      <span class="label">
      Customer:
      </span>

      ${name}

      <br>

      <span class="label">
      Product:
      </span>

      ${product}

      <br>

      <span class="label">
      Product Price:
      </span>

      ₹${productPrice}

      <br>

      <span class="label">
      Down Payment:
      </span>

      ₹${downPayment}

      <br>

      <span class="label">
      Loan Amount:
      </span>

      ₹${loanAmount}

      <br>

      <span class="label">
      Interest Rate:
      </span>

      ${rate}%

      <br>

      <span class="label">
      Duration:
      </span>

      ${months} Months

      <br>

      <span class="label">
      Monthly EMI:
      </span>

      ₹${emi}

      <br>

      <span class="label">
      Total Interest:
      </span>

      ₹${totalInterest}

      <br>

      <span class="label">
      Total Payment:
      </span>

      ₹${totalPayment}

      <br>

      <span class="label">
      Next EMI Date:
      </span>

      ${nextDate}

      </div>
      `;
    }

  </script>

</body>
</html>
